services:
  - type: web
    name: bloomberg-terminal
    env: node
    rootDir: version 2
    buildCommand: npm install && npm install --prefix server && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: FINNHUB_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: NVIDIA_NIM_API_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
